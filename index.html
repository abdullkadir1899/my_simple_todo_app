<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager - Premium Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --tertiary-bg: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #475569;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 400px);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* PIN LOCK SCREEN */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090d16;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .lock-card {
            background: var(--secondary-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .lock-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .lock-card h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .lock-card p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .pin-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .pin-input {
            width: 100%;
            padding: 15px;
            background: var(--primary-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s;
        }

        .pin-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .pin-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .pin-btn:active {
            transform: scale(0.98);
        }

        /* HEADER */
        .app-header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            background: var(--tertiary-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .header-btn.add-btn {
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border: none;
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 70px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* STOCK GRID */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        /* STOCK CARD */
        .stock-card {
            background: var(--secondary-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15);
        }

        /* CARD IMAGE SLIDER */
        .card-image-container {
            width: 100%;
            height: 180px;
            position: relative;
            background: #151f32;
            overflow: hidden;
        }

        .card-slider {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out;
        }

        .card-slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 2;
        }

        .slider-arrow.left { left: 8px; }
        .slider-arrow.right { right: 8px; }

        .image-counter {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            backdrop-filter: blur(4px);
        }

        .product-content {
            padding: 16px;
            flex: 1;
        }

        .product-title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .info-row strong {
            color: var(--text-primary);
        }

        .badge-date {
            display: inline-block;
            background: var(--tertiary-bg);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 5px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            padding: 12px 16px 16px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .edit-btn { background: var(--tertiary-bg); color: white; }
        .edit-btn:hover { background: var(--border); }
        .delete-btn { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.25); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--secondary-bg);
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body { padding: 20px; }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--primary-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* NEW UPLOAD ZONE */
        .upload-zone {
            width: 100%;
            min-height: 140px;
            background: var(--primary-bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 15px;
            transition: all 0.3s;
            text-align: center;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-zone-icon { font-size: 40px; margin-bottom: 8px; }
        .upload-zone p { font-size: 13px; color: var(--text-secondary); }

        .preview-thumbs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .thumb-wrapper {
            width: 70px;
            height: 70px;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .thumb-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--danger);
            color: white;
            border: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; }
        .btn-secondary { background: var(--tertiary-bg); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 3000;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: var(--success); color: white; }
        .toast.error { background: var(--danger); color: white; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .hidden { display: none !important; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-card">
            <div class="lock-icon">🔐</div>
            <h2>স্টক ম্যানেজার লক</h2>
            <p>অ্যাপ্লিকেশনটি ব্যবহার করতে সঠিক পিন নম্বরটি প্রদান করুন।</p>
            <div class="pin-input-group">
                <input type="password" id="pinCode" class="pin-input" placeholder="•••••••••••" maxlength="11">
            </div>
            <button class="pin-btn" id="loginBtn">আনলক করুন</button>
        </div>
    </div>

    <header class="app-header">
        <h1>📦 Stock Manager <span style="font-size: 12px; background: rgba(99,102,241,0.2); padding: 4px 8px; border-radius: 20px; color: #a5b4fc;">Cloud Sync</span></h1>
        <div class="header-actions">
            <button class="header-btn" id="clearAllBtn">🗑️ সব মুছুন</button>
            <button class="header-btn add-btn" id="addProductBtn">➕ নতুন পণ্য</button>
        </div>
    </header>

    <div class="container">
        <div class="stock-grid" id="stockGrid">
            </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">নতুন পণ্য যোগ করুন</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">পণ্যের নাম *</label>
                    <input type="text" class="form-input" id="productName" placeholder="যেমন: মিনিকেট চাল, ল্যাপটপ ইত্যাদি...">
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">পরিমাণ *</label>
                        <input type="number" class="form-input" id="productQuantity" placeholder="সংখ্যা লিখুন...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">মাপের একক (Unit) *</label>
                        <select class="form-input" id="productUnit">
                            <option value="পিস">পিস (Pcs)</option>
                            <option value="কেজি">কেজি (KG)</option>
                            <option value="কার্টন">কার্টন (Carton)</option>
                            <option value="বস্তা">বস্তা (Sack)</option>
                            <option value="লিটার">লিটার (Litre)</option>
                            <option value="গজ">গজ (Yard)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">দাম (প্রতি একক) *</label>
                        <input type="number" class="form-input" id="productPrice" placeholder="৳ দাম লিখুন...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">তারিখ (ঐচ্ছিক)</label>
                        <input type="date" class="form-input" id="productDate">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">পণ্যের ছবি (একাধিক আপলোড করতে পারেন)</label>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-zone-icon">📸</div>
                        <p>এখানে ক্লিক করুন অথবা ছবি ড্র্যাগ করে ছেড়ে দিন</p>
                        <span style="font-size: 11px; color: var(--text-secondary);">সর্বোচ্চ ৫টি ছবি যুক্ত করার পরামর্শ দেওয়া হলো</span>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" multiple class="hidden">
                    <div class="preview-thumbs-grid" id="previewThumbsGrid"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">বাতিল</button>
                <button class="btn btn-primary" id="saveProductBtn">সংরক্ষণ করুন</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content" style="max-width: 350px;">
            <div class="modal-header">
                <h2>নিশ্চিত করুন</h2>
                <button class="close-btn" id="closeConfirmBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="color: var(--text-secondary); line-height: 1.5;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirmCancelBtn">বাতিল</button>
                <button class="btn btn-danger" id="confirmActionBtn">মুছে ফেলুন</button>
            </div>
        </div>
    </div>

    <script>
        // ========== APP CONFIG & STATE ==========
        const app = {
            products: [],
            editingProductId: null,
            uploadedImages: [], // Holds Base64 array of current editing/adding item
            pendingAction: null,
            correctPin: "01942154634",
            
            // Multi-user Sync URL (ফ্রি পাবলিক কি-ভ্যালু ক্লাউড ডেটাবেজ আপনার পিনের আইডিতে)
            // এর মাধ্যমে যে কেউ যেকোনো ব্রাউজার থেকে এই ফাইল ওপেন করলে ডাটা লাইভ সিঙ্ক পাবে।
            syncApiUrl: "https://kvdb.io/S8dfY7sd8f7G6s7df6s7/stock_manager_db_" + "01942154634",

            init() {
                this.checkSessionLock();
                this.setupEventListeners();
                this.loadProducts();
            },

            checkSessionLock() {
                if (sessionStorage.getItem('isUnlocked') === 'true') {
                    document.getElementById('lockScreen').classList.add('hidden');
                }
            },

            setupEventListeners() {
                // Pin Unlock
                document.getElementById('loginBtn').addEventListener('click', () => this.handleUnlock());
                document.getElementById('pinCode').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleUnlock();
                });

                // App Actions
                document.getElementById('addProductBtn').addEventListener('click', () => this.openAddModal());
                document.getElementById('clearAllBtn').addEventListener('click', () => this.showClearConfirmation());

                // Modal Control
                document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('saveProductBtn').addEventListener('click', () => this.saveProduct());

                // Modern Upload Zone Click and Drag-Drop
                const uploadZone = document.getElementById('uploadZone');
                const imageInput = document.getElementById('imageInput');

                uploadZone.addEventListener('click', () => imageInput.click());
                
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    if (e.dataTransfer.files) this.handleImageFiles(e.dataTransfer.files);
                });

                imageInput.addEventListener('change', (e) => {
                    if (e.target.files) this.handleImageFiles(e.target.files);
                });

                // Confirm Modal
                document.getElementById('closeConfirmBtn').addEventListener('click', () => this.closeConfirmModal());
                document.getElementById('confirmCancelBtn').addEventListener('click', () => this.closeConfirmModal());
                document.getElementById('confirmActionBtn').addEventListener('click', () => this.executeConfirmedAction());
            },

            // ========== AUTHENTICATION ==========
            handleUnlock() {
                const inputPin = document.getElementById('pinCode').value;
                if (inputPin === this.correctPin) {
                    sessionStorage.setItem('isUnlocked', 'true');
                    document.getElementById('lockScreen').style.transition = "opacity 0.3s";
                    document.getElementById('lockScreen').style.opacity = 0;
                    setTimeout(() => {
                        document.getElementById('lockScreen').classList.add('hidden');
                    }, 300);
                    this.showToast('সফলভাবে আনলক হয়েছে', 'success');
                } else {
                    this.showToast('ভুল পিন নম্বর! আবার চেষ্টা করুন।', 'error');
                    document.getElementById('pinCode').value = '';
                    document.getElementById('pinCode').focus();
                }
            },

            // ========== IMAGE PROCESSING (MULTIPLE) ==========
            handleImageFiles(files) {
                Array.from(files).forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    
                    if (file.size > 3 * 1024 * 1024) {
                        this.showToast('প্রতিটি ছবির সাইজ ৩MB এর কম হতে হবে', 'error');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.uploadedImages.push(e.target.result);
                        this.renderUploadPreviews();
                    };
                    reader.readAsDataURL(file);
                });
            },

            removeUploadedImage(index) {
                this.uploadedImages.splice(index, 1);
                this.renderUploadPreviews();
            },

            renderUploadPreviews() {
                const grid = document.getElementById('previewThumbsGrid');
                grid.innerHTML = this.uploadedImages.map((img, index) => `
                    <div class="thumb-wrapper">
                        <img src="${img}" alt="Preview">
                        <button class="thumb-remove" onclick="app.removeUploadedImage(${index})">&times;</button>
                    </div>
                `).join('');
            },

            // ========== CARD IMAGE SLIDER NAVIGATION ==========
            moveSlider(productId, direction) {
                const card = document.querySelector(`[data-id="${productId}"]`);
                const slider = card.querySelector('.card-slider');
                const counter = card.querySelector('.current-index');
                const total = parseInt(card.querySelector('.total-count').textContent);
                
                let currentIndex = parseInt(slider.getAttribute('data-index') || 0);
                
                if (direction === 'next') {
                    currentIndex = (currentIndex + 1) % total;
                } else {
                    currentIndex = (currentIndex - 1 + total) % total;
                }
                
                slider.setAttribute('data-index', currentIndex);
                slider.style.transform = `translateX(-${currentIndex * 100}%)`;
                counter.textContent = currentIndex + 1;
            },

            // ========== OPERATIONS ==========
            saveProduct() {
                const name = document.getElementById('productName').value.trim();
                const quantity = document.getElementById('productQuantity').value.trim();
                const unit = document.getElementById('productUnit').value;
                const price = document.getElementById('productPrice').value.trim();
                const date = document.getElementById('productDate').value;

                if (!name || !quantity || !price) {
                    this.showToast('দয়া করে সব বাধ্যতামূলক (*) তথ্য পূরণ করুন', 'error');
                    return;
                }

                if (this.editingProductId) {
                    const product = this.products.find(p => p.id === this.editingProductId);
                    if (product) {
                        product.name = name;
                        product.quantity = quantity;
                        product.unit = unit;
                        product.price = price;
                        product.date = date;
                        product.images = [...this.uploadedImages];
                        product.updatedAt = new Date().toISOString();
                    }
                    this.showToast('পণ্য আপডেট করা হয়েছে', 'success');
                } else {
                    const newProduct = {
                        id: Date.now(),
                        name,
                        quantity,
                        unit,
                        price,
                        date,
                        images: [...this.uploadedImages],
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    this.products.unshift(newProduct);
                    this.showToast('নতুন পণ্য যোগ করা হয়েছে', 'success');
                }

                this.saveProductsToStorage();
                this.closeModal();
                this.render();
            },

            deleteProduct(id) {
                this.pendingAction = { type: 'delete', id };
                this.showConfirmation('আপনি কি নিশ্চিতভাবে এই পণ্যটি স্টক থেকে মুছে ফেলতে চান?');
            },

            openAddModal() {
                this.editingProductId = null;
                this.uploadedImages = [];
                document.getElementById('modalTitle').textContent = 'নতুন পণ্য যোগ করুন';
                document.getElementById('productName').value = '';
                document.getElementById('productQuantity').value = '';
                document.getElementById('productUnit').value = 'পিস';
                document.getElementById('productPrice').value = '';
                document.getElementById('productDate').value = '';
                this.renderUploadPreviews();
                
                document.getElementById('productModal').classList.add('active');
                document.body.classList.add('no-scroll');
            },

            openEditModal(id) {
                const product = this.products.find(p => p.id === id);
                if (!product) return;

                this.editingProductId = id;
                this.uploadedImages = product.images ? [...product.images] : [];

                document.getElementById('modalTitle').textContent = 'পণ্যের তথ্য এডিট করুন';
                document.getElementById('productName').value = product.name;
                document.getElementById('productQuantity').value = product.quantity;
                document.getElementById('productUnit').value = product.unit || 'পিস';
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productDate').value = product.date || '';
                
                this.renderUploadPreviews();
                document.getElementById('productModal').classList.add('active');
                document.body.classList.add('no-scroll');
            },

            closeModal() {
                document.getElementById('productModal').classList.remove('active');
                document.body.classList.remove('no-scroll');
            },

            // ========== STORAGE & CLOUD SYNC ==========
            saveProductsToStorage() {
                // local save
                localStorage.setItem('stock_products', JSON.stringify(this.products));
                
                // Cloud Sync (সব ইউজারের ডাটা একসাথে আপডেট রাখার জন্য)
                fetch(this.syncApiUrl, {
                    method: 'POST',
                    body: JSON.stringify(this.products),
                    headers: { 'Content-Type': 'application/json' }
                }).catch(err => console.log("Cloud sync temporary delay, saved locally."));
            },

            loadProducts() {
                // প্রথমে লোকাল ডাটা লোড করি দ্রুত দেখানোর জন্য
                const stored = localStorage.getItem('stock_products');
                this.products = stored ? JSON.parse(stored) : [];
                this.render();

                // এরপর ক্লাউড সার্ভার থেকে লাইভ আপডেট ডাটা নিয়ে আসি
                fetch(this.syncApiUrl)
                    .then(res => {
                        if(res.ok) return res.json();
                    })
                    .then(data => {
                        if (data && Array.isArray(data)) {
                            this.products = data;
                            localStorage.setItem('stock_products', JSON.stringify(data));
                            this.render();
                        }
                    })
                    .catch(e => console.log("Offline mode active. Using local data."));
            },

            showClearConfirmation() {
                this.pendingAction = { type: 'clearAll' };
                this.showConfirmation('সব ডাটা মুছে ফেলতে চান? ক্লাউডসহ সব ডিভাইসের ডাটা সম্পূর্ণ মুছে যাবে এবং এটি আর ফেরানো সম্ভব নয়।');
            },

            // ========== CONFIRMATION SYSTEM ==========
            showConfirmation(message) {
                document.getElementById('confirmMessage').textContent = message;
                document.getElementById('confirmModal').classList.add('active');
            },

            closeConfirmModal() {
                document.getElementById('confirmModal').classList.remove('active');
                this.pendingAction = null;
            },

            executeConfirmedAction() {
                if (!this.pendingAction) return;

                if (this.pendingAction.type === 'delete') {
                    this.products = this.products.filter(p => p.id !== this.pendingAction.id);
                    this.saveProductsToStorage();
                    this.render();
                    this.showToast('পণ্য মুছে ফেলা হয়েছে', 'success');
                } else if (this.pendingAction.type === 'clearAll') {
                    this.products = [];
                    this.saveProductsToStorage();
                    this.render();
                    this.showToast('সকল পণ্য সম্পূর্ণ মুছে ফেলা হয়েছে', 'success');
                }
                this.closeConfirmModal();
            },

            // ========== RENDER DRAWING ==========
            render() {
                const grid = document.getElementById('stockGrid');

                if (this.products.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>কোনো পণ্যের ডাটা পাওয়া যায়নি। নতুন পণ্য যোগ করুন!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = this.products.map(product => this.renderProductCard(product)).join('');
            },

            renderProductCard(product) {
                const dateObj = new Date(product.updatedAt);
                const timeString = this.formatDate(dateObj);
                const unit = product.unit || 'পিস';
                
                // Multi Image Slider HTML logic
                let imageSectionHtml = '<div class="card-image-container"><div class="card-slider">📸 নো ইমেজ</div></div>';
                if (product.images && product.images.length > 0) {
                    const imgsHtml = product.images.map(img => `<img src="${img}" alt="Product">`).join('');
                    const arrowsHtml = product.images.length > 1 ? `
                        <button class="slider-arrow left" onclick="app.moveSlider(${product.id}, 'prev')">❮</button>
                        <button class="slider-arrow right" onclick="app.moveSlider(${product.id}, 'next')">❯</button>
                        <div class="image-counter"><span class="current-index">1</span>/<span class="total-count">${product.images.length}</span></div>
                    ` : '';
                    
                    imageSectionHtml = `
                        <div class="card-image-container" data-id="${product.id}">
                            <div class="card-slider" data-index="0">
                                ${imgsHtml}
                            </div>
                            ${arrowsHtml}
                        </div>
                    `;
                }

                const optionalDateHtml = product.date ? `<div class="badge-date">📅 নথিভুক্ত তারিখ: ${product.date}</div>` : '';

                return `
                    <div class="stock-card">
                        ${imageSectionHtml}
                        <div class="product-content">
                            <div class="product-title">${this.escapeHtml(product.name)}</div>
                            <div class="info-row">📦 পরিমাণ: <strong>${this.escapeHtml(product.quantity)} ${unit}</strong></div>
                            <div class="info-row">💰 দাম: <strong>৳${this.escapeHtml(product.price)}</strong> (প্রতি ${unit})</div>
                            ${optionalDateHtml}
                            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 12px; opacity: 0.7;">হালনাগাদ: ${timeString}</div>
                        </div>
                        <div class="product-actions">
                            <button class="action-btn edit-btn" onclick="app.openEditModal(${product.id})">✏️ এডিট</button>
                            <button class="action-btn delete-btn" onclick="app.deleteProduct(${product.id})">🗑️ মুছুন</button>
                        </div>
                    </div>
                `;
            },

            formatDate(date) {
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                if (date.toDateString() === today.toDateString()) {
                    return 'আজ ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else if (date.toDateString() === yesterday.toDateString()) {
                    return 'গতকাল';
                } else {
                    return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            showToast(message, type = 'success') {
                const oldToast = document.querySelector('.toast');
                if (oldToast) oldToast.remove();

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = type === 'success' ? `✅ ${message}` : `❌ ${message}`;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.transform = 'translateX(150px)';
                    toast.style.opacity = '0';
                    toast.style.transition = 'all 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
