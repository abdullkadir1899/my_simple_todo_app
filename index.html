<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #1a1a1a;
            --secondary-bg: #2d2d2d;
            --tertiary-bg: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --success: #10b981;
            --border: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* HEADER */
        .app-header {
            background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .header-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.95);
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            min-height: calc(100vh - 80px);
        }

        /* EMPTY STATE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            opacity: 0.6;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* STOCK GRID */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .stock-grid {
                grid-template-columns: 1fr;
            }
        }

        /* STOCK CARD */
        .stock-card {
            background: var(--secondary-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--border);
            min-height: 200px;
        }

        .stock-card:active {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--tertiary-bg), var(--secondary-bg));
        }

        .product-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            word-break: break-word;
            line-height: 1.3;
        }

        .product-info {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .product-timestamp {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.7;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            padding: 8px 12px 12px 12px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .edit-btn {
            background: var(--accent);
            color: white;
        }

        .edit-btn:active {
            background: var(--accent-hover);
            transform: scale(0.95);
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .delete-btn:active {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(0.95);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 769px) {
            .modal.active {
                align-items: center;
            }

            .modal-content {
                width: 90%;
                max-width: 500px;
                max-height: 90vh;
            }
        }

        .modal-content {
            background: var(--secondary-bg);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
        }

        @media (min-width: 769px) {
            .modal-content {
                border-radius: 16px;
            }
        }

        .modal-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--secondary-bg);
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:active {
            opacity: 0.6;
        }

        .modal-body {
            padding: 20px 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--tertiary-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--tertiary-bg);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: var(--tertiary-bg);
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-empty {
            color: var(--text-secondary);
            font-size: 40px;
        }

        .image-button-group {
            display: flex;
            gap: 8px;
        }

        .image-btn {
            flex: 1;
            padding: 12px;
            background: var(--tertiary-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .image-btn:active {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(0.97);
        }

        .remove-image-btn {
            color: var(--danger);
        }

        .remove-image-btn:active {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        /* ACTION BUTTONS */
        .modal-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--secondary-bg);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-secondary {
            background: var(--tertiary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:active {
            background: var(--border);
            transform: scale(0.97);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:active {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(0.97);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* TOAST NOTIFICATIONS */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: var(--tertiary-bg);
            color: var(--text-primary);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .toast.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* FILE INPUT */
        input[type="file"] {
            display: none;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .app-header h1 { font-size: 20px; }
            .container { padding: 12px; }
            .modal-header { padding: 16px; }
            .modal-body { padding: 16px; }
            .modal-footer { padding: 12px; }
            .btn { padding: 10px 12px; font-size: 13px; }
        }

        .hidden { display: none !important; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body>
    <header class="app-header">
        <h1>📦 Stock Manager</h1>
        <div class="header-actions">
            <button class="header-btn" id="clearAllBtn" title="Clear All Data">🗑️</button>
            <button class="header-btn" id="addProductBtn" title="Add Product">➕</button>
        </div>
    </header>

    <div class="container">
        <div class="stock-grid" id="stockGrid">
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <p>কোনো পণ্য নেই। নতুন পণ্য যোগ করুন!</p>
            </div>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">নতুন পণ্য</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">পণ্যের নাম</label>
                    <input type="text" class="form-input" id="productName" placeholder="পণ্যের নাম লিখুন...">
                </div>

                <div class="form-group">
                    <label class="form-label">পরিমাণ</label>
                    <input type="number" class="form-input" id="productQuantity" placeholder="পরিমাণ (সংখ্যা) লিখুন...">
                </div>

                <div class="form-group">
                    <label class="form-label">দাম (প্রতি পিস/কেজি)</label>
                    <input type="number" class="form-input" id="productPrice" placeholder="দাম লিখুন...">
                </div>

                <div class="form-group">
                    <label class="form-label">পণ্যের ছবি</label>
                    <div class="image-preview" id="imagePreview">
                        <div class="image-preview-empty">🖼️</div>
                    </div>
                    <div class="image-button-group">
                        <button class="image-btn" id="uploadImageBtn">📤 ছবি আপলোড</button>
                        <button class="image-btn remove-image-btn" id="removeImageBtn">✕ মুছে ফেলুন</button>
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">বাতিল</button>
                <button class="btn btn-primary" id="saveProductBtn">সংরক্ষণ</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content" style="max-width: 300px; max-height: auto;">
            <div class="modal-header">
                <h2>নিশ্চিত করুন</h2>
                <button class="close-btn" id="closeConfirmBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="color: var(--text-secondary); margin-bottom: 20px;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirmCancelBtn">বাতিল</button>
                <button class="btn btn-danger" id="confirmActionBtn">নিশ্চিত</button>
            </div>
        </div>
    </div>

    <script>
        // ========== APP STATE ==========
        const app = {
            products: [],
            editingProductId: null,
            currentImageBase64: null,
            pendingAction: null,

            init() {
                this.loadProducts();
                this.setupEventListeners();
                this.render();
            },

            setupEventListeners() {
                document.getElementById('addProductBtn').addEventListener('click', () => this.openAddModal());
                document.getElementById('clearAllBtn').addEventListener('click', () => this.showClearConfirmation());

                document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('saveProductBtn').addEventListener('click', () => this.saveProduct());

                document.getElementById('uploadImageBtn').addEventListener('click', () => {
                    document.getElementById('imageInput').click();
                });
                document.getElementById('imageInput').addEventListener('change', (e) => this.handleImageUpload(e));
                document.getElementById('removeImageBtn').addEventListener('click', () => this.removeImage());

                document.getElementById('closeConfirmBtn').addEventListener('click', () => this.closeConfirmModal());
                document.getElementById('confirmCancelBtn').addEventListener('click', () => this.closeConfirmModal());
                document.getElementById('confirmActionBtn').addEventListener('click', () => this.executeConfirmedAction());

                document.getElementById('productModal').addEventListener('click', (e) => {
                    if (e.target.id === 'productModal') this.closeModal();
                });
                document.getElementById('confirmModal').addEventListener('click', (e) => {
                    if (e.target.id === 'confirmModal') this.closeConfirmModal();
                });
            },

            // ========== STOCK OPERATIONS ==========
            saveProduct() {
                const name = document.getElementById('productName').value.trim();
                const quantity = document.getElementById('productQuantity').value.trim();
                const price = document.getElementById('productPrice').value.trim();

                if (!name || !quantity || !price) {
                    this.showToast('দয়া করে সব তথ্য সঠিকভাবে পূরণ করুন', 'error');
                    return;
                }

                if (this.editingProductId) {
                    const product = this.products.find(p => p.id === this.editingProductId);
                    if (product) {
                        product.name = name;
                        product.quantity = quantity;
                        product.price = price;
                        product.image = this.currentImageBase64;
                        product.updatedAt = new Date().toISOString();
                    }
                    this.showToast('পণ্য আপডেট করা হয়েছে', 'success');
                } else {
                    const newProduct = {
                        id: Date.now(),
                        name,
                        quantity,
                        price,
                        image: this.currentImageBase64,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    this.products.unshift(newProduct);
                    this.showToast('নতুন পণ্য যোগ করা হয়েছে', 'success');
                }

                this.saveProducts();
                this.closeModal();
                this.render();
            },

            deleteProduct(id) {
                this.pendingAction = { type: 'delete', id };
                this.showConfirmation('আপনি কি পণ্যটি তালিকা থেকে মুছে ফেলতে চান?');
            },

            openAddModal() {
                this.editingProductId = null;
                this.currentImageBase64 = null;
                document.getElementById('modalTitle').textContent = 'নতুন পণ্য যোগ করুন';
                document.getElementById('productName').value = '';
                document.getElementById('productQuantity').value = '';
                document.getElementById('productPrice').value = '';
                this.renderImagePreview();
                document.getElementById('productModal').classList.add('active');
                document.body.classList.add('no-scroll');
                document.getElementById('productName').focus();
            },

            openEditModal(id) {
                const product = this.products.find(p => p.id === id);
                if (!product) return;

                this.editingProductId = id;
                this.currentImageBase64 = product.image;

                document.getElementById('modalTitle').textContent = 'পণ্য এডিট করুন';
                document.getElementById('productName').value = product.name;
                document.getElementById('productQuantity').value = product.quantity;
                document.getElementById('productPrice').value = product.price;
                this.renderImagePreview();

                document.getElementById('productModal').classList.add('active');
                document.body.classList.add('no-scroll');
            },

            closeModal() {
                document.getElementById('productModal').classList.remove('active');
                document.body.classList.remove('no-scroll');
                this.editingProductId = null;
                this.currentImageBase64 = null;
            },

            // ========== IMAGE HANDLING ==========
            handleImageUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                if (file.size > 5 * 1024 * 1024) {
                    this.showToast('ছবির সাইজ ৫MB এর কম হতে হবে', 'error');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    this.currentImageBase64 = e.target.result;
                    this.renderImagePreview();
                };
                reader.readAsDataURL(file);
            },

            removeImage() {
                this.currentImageBase64 = null;
                this.renderImagePreview();
            },

            renderImagePreview() {
                const preview = document.getElementById('imagePreview');
                if (this.currentImageBase64) {
                    preview.innerHTML = `<img src="${this.currentImageBase64}" alt="Preview">`;
                } else {
                    preview.innerHTML = '<div class="image-preview-empty">🖼️</div>';
                }
            },

            // ========== STORAGE ==========
            saveProducts() {
                localStorage.setItem('products', JSON.stringify(this.products));
            },

            loadProducts() {
                try {
                    const stored = localStorage.getItem('products');
                    this.products = stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Error loading stock:', e);
                    this.products = [];
                }
            },

            // ========== CLEAR ALL ==========
            showClearConfirmation() {
                this.pendingAction = { type: 'clearAll' };
                this.showConfirmation('সব ডাটা মুছে ফেলতে চান? এটি আর ফেরানো যাবে না।');
            },

            clearAllProducts() {
                this.products = [];
                this.saveProducts();
                this.render();
                this.showToast('সব পণ্য মুছে ফেলা হয়েছে', 'success');
            },

            // ========== CONFIRMATION MODAL ==========
            showConfirmation(message) {
                document.getElementById('confirmMessage').textContent = message;
                document.getElementById('confirmModal').classList.add('active');
                document.body.classList.add('no-scroll');
            },

            closeConfirmModal() {
                document.getElementById('confirmModal').classList.remove('active');
                document.body.classList.remove('no-scroll');
                this.pendingAction = null;
            },

            executeConfirmedAction() {
                if (!this.pendingAction) return;

                if (this.pendingAction.type === 'delete') {
                    this.products = this.products.filter(p => p.id !== this.pendingAction.id);
                    this.saveProducts();
                    this.render();
                    this.showToast('পণ্য মুছে ফেলা হয়েছে', 'success');
                } else if (this.pendingAction.type === 'clearAll') {
                    this.clearAllProducts();
                }

                this.closeConfirmModal();
            },

            // ========== RENDERING ==========
            render() {
                const grid = document.getElementById('stockGrid');

                if (this.products.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>কোনো পণ্য নেই। নতুন পণ্য যোগ করুন!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = this.products.map(product => this.renderProductCard(product)).join('');
            },

            renderProductCard(product) {
                const date = new Date(product.updatedAt);
                const timeString = this.formatDate(date);
                const imageHtml = product.image ? `<img src="${product.image}" class="product-image" alt="Product image">` : '';

                return `
                    <div class="stock-card">
                        ${imageHtml}
                        <div class="product-content">
                            <div class="product-title">${this.escapeHtml(product.name)}</div>
                            <div class="product-info">📦 পরিমাণ: ${this.escapeHtml(product.quantity)} পিস</div>
                            <div class="product-info">💰 দাম: ৳${this.escapeHtml(product.price)} (প্রতি পিস)</div>
                            <div class="product-timestamp">হালনাগাদ: ${timeString}</div>
                        </div>
                        <div class="product-actions">
                            <button class="action-btn edit-btn" onclick="app.openEditModal(${product.id})">
                                ✏️ এডিট
                            </button>
                            <button class="action-btn delete-btn" onclick="app.deleteProduct(${product.id})">
                                🗑️ মুছুন
                            </button>
                        </div>
                    </div>
                `;
            },

            formatDate(date) {
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                if (date.toDateString() === today.toDateString()) {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else if (date.toDateString() === yesterday.toDateString()) {
                    return 'গতকাল';
                } else {
                    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                }
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideDown 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
